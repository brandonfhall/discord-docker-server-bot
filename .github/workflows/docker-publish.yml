name: Docker Build & Publish

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/discord-docker-bot

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  # Rebuild monthly to pick up base image security updates automatically
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true,default=true
            type=raw,value={{date 'YYYYMMDD'}}
            type=ref,event=tag
            type=schedule,pattern=monthly

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./DOCKERHUB.md

  prune-tags:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Prune old tags
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          KEEP_N: 5
          IGNORE_TAGS: "latest,develop"
          # Tags this very run just pushed (e.g. today's date tag) must never be
          # pruned, no matter what Docker Hub's tags API reports for their
          # last_updated -- it can lag a freshly-pushed tag by more than the time
          # it takes this job to start, which previously caused the brand-new tag
          # to sort as "oldest" and get deleted seconds after being published.
          NEW_TAGS: ${{ needs.build-and-push.outputs.tags }}
          DRY_RUN: false
        run: |
          # 1. Authenticate with Docker Hub to get JWT
          echo "Logging in to Docker Hub..."
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "'${DOCKER_USER}'", "password": "'${DOCKER_PASS}'"}' https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Failed to authenticate with Docker Hub."
            exit 1
          fi

          # 2. Fetch tags (limit 100, usually sufficient for retention policies)
          # Sorted by last_updated descending so we process newest first
          echo "Fetching tags for $IMAGE_NAME (sorted by date)..."
          TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/?page_size=100&ordering=-last_updated" | jq -r '.results[].name')

          # 3. Filter out ignored tags and this run's freshly-pushed tags. The
          # latter matters even though they're also the newest by push time:
          # Docker Hub's tags API can lag a same-run push by more than the time
          # it takes this job to start, so relying on API-reported last_updated
          # alone can make a tag pushed seconds ago sort as the oldest and get
          # deleted -- confirmed happening in practice, not a hypothetical.
          THIS_RUN_TAGS=$(echo "$NEW_TAGS" | sed -E "s#^${IMAGE_NAME}:##")
          FULL_IGNORE=$(printf '%s\n%s\n' "$IGNORE_TAGS" "$THIS_RUN_TAGS" | tr ',' '\n' | grep -v '^$' | paste -sd, -)
          echo "Protecting tags from pruning: $FULL_IGNORE"
          # Convert comma-separated ignore list to regex alternation (e.g., "latest|develop|20260712")
          IGNORE_REGEX="^($(echo "$FULL_IGNORE" | tr ',' '|'))$"
          CANDIDATE_TAGS=$(echo "$TAGS" | grep -vE "$IGNORE_REGEX" || true)
          
          # Skip the first N tags (keep-last)
          TAGS_TO_DELETE=$(echo "$CANDIDATE_TAGS" | tail -n +$(($KEEP_N + 1)))

          if [ -z "$TAGS_TO_DELETE" ]; then
            echo "No tags found to delete (keeping latest $KEEP_N)."
            exit 0
          fi

          echo "Found tags to delete:"
          echo "$TAGS_TO_DELETE"

          # 4. Delete tags
          for TAG in $TAGS_TO_DELETE; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete: $TAG"
            else
              echo "Deleting $TAG..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${TAG}/")
              if [ "$HTTP_CODE" -eq 204 ]; then
                echo "✅ Deleted $TAG"
              else
                echo "❌ Failed to delete $TAG (HTTP $HTTP_CODE)"
              fi
            fi
          done
        