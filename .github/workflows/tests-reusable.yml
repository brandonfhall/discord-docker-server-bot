name: Tests (Reusable)

on:
  workflow_call:
    inputs:
      docker-smoke:
        description: "Run the Docker image build + container startup smoke test after lint/tests"
        type: boolean
        required: false
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Run unit tests
        env:
          BOT_TOKEN: "test_token_mock"
          ALLOWED_CONTAINERS: "test_container"
          DISCORD_GUILD_ID: "123456789"
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest -v --cov=src --cov-report=term-missing tests/

      - name: Build Docker image (smoke test)
        if: ${{ inputs.docker-smoke }}
        run: docker build . --file Dockerfile --tag bot-test:latest

      - name: Test container startup (smoke test)
        if: ${{ inputs.docker-smoke }}
        run: docker run --rm -e BOT_TOKEN=test_token -e ALLOWED_CONTAINERS=test_container -e DISCORD_GUILD_ID=123456789 bot-test:latest python -c "import src.bot; print('Container environment is valid')"
