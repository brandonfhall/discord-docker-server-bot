name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

# Cancel any in-progress run for the same branch when a newer commit arrives.
# This prevents the double-run caused by push + pull_request both firing on the same commit.
concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml
