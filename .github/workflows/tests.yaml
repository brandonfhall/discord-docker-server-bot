name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  # Manual full run (including the Docker smoke test) on any branch, e.g. to
  # pre-verify the image before opening a PR: gh workflow run tests.yaml --ref <branch>
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR/event-type when a newer
# commit arrives, so rapid successive pushes don't queue up redundant runs.
# Scoped by event_name as well as branch: a branch with an open PR fires both a
# push run and a pull_request run for the same commit, and "test / test" is a
# required status check on main -- if those two shared one concurrency group,
# the push run (which starts first) gets cancelled by the pull_request run a
# few seconds later, leaving a CANCELLED context on the required check and
# permanently blocking the merge for that commit (confirmed happening on
# PR #72). Keeping push and pull_request runs in separate groups means each
# type still self-cancels on rapid re-pushes, but the two never cancel each
# other.
concurrency:
  group: tests-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml
    with:
      # Branch pushes get the fast feedback loop (lint + tests only); the Docker
      # build + startup smoke test runs on the pre-merge gates — PRs to main and
      # pushes to main — and on manual dispatch. The "test / test" check this job
      # reports is required by the main ruleset, so a PR can't merge until the
      # full job (smoke test included) passes.
      docker-smoke: ${{ github.event_name != 'push' || github.ref == 'refs/heads/main' }}
