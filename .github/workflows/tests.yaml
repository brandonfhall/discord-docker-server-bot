name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel any in-progress run for the same branch/PR when a newer commit arrives,
# so rapid successive pushes don't queue up redundant runs.
concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml
