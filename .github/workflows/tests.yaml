name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

# Cancel any in-progress run for the same branch/PR when a newer commit arrives,
# so rapid successive pushes don't queue up redundant runs. For a branch with an
# open PR to main, a push fires both a push run and a pull_request run — they
# share this group (head_ref for PRs, ref_name for pushes both resolve to the
# branch name), so the newer one cancels the older instead of running twice.
concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml
    with:
      # Branch pushes get the fast feedback loop (lint + tests only); the Docker
      # build + startup smoke test runs on the pre-merge gates — PRs to main and
      # pushes to main — where image breakage must be caught.
      docker-smoke: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
