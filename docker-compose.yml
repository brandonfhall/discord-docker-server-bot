services:
  my-game-server:
    image: alpine:latest
    command: tail -f /dev/null
    container_name: my_game_server
    # configure volumes/ports as you normally would for your server

  discord-bot:
    image: brandonh317/discord-docker-bot:latest
    container_name: discord_bot
    environment:
      - BOT_TOKEN
      - ALLOWED_CONTAINERS
      - DEFAULT_ALLOWED_ROLES
      - CONTAINER_MESSAGE_CMD
      - STATUS_PORT
      - DOCKER_MAX_WORKERS
      - SHUTDOWN_DELAY
      - LOG_LEVEL
      - DISCORD_GUILD_ID
      - ALLOW_ANY_GUILD
      - PERMISSIONS_FILE
      - LOG_FILE
      - ANNOUNCE_CHANNEL_ID
      - ANNOUNCE_ROLE_ID
      - STATUS_TOKEN
      - ALLOWED_CHANNEL_IDS
      - COMMAND_COOLDOWN
      - CRASH_CHECK_INTERVAL
      - CRASH_ALERT_CHANNEL_ID
      - HISTORY_FILE
      - HEALTHCHECK_POLL_INTERVAL
      - HEALTHCHECK_MAX_WAIT
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Defaults to rw, required for start/stop
      - bot_data:/app/data
    restart: unless-stopped
    # No compose-level healthcheck override -- the image's own HEALTHCHECK (Dockerfile)
    # already expands ${STATUS_PORT:-8000} correctly and hits /healthz, so it stays
    # correct even if STATUS_PORT is customized here.
    ports:
      # Bound to the Docker host's loopback only -- the /status API includes recent
      # log lines and the permission map, and STATUS_TOKEN is not set by default.
      # Change to "8000:8000" (and set STATUS_TOKEN) to expose it beyond localhost.
      - "127.0.0.1:8000:8000"

volumes:
  bot_data:
