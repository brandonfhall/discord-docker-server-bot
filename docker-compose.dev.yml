services:
  # Mock game server for local testing
  my-game-server:
    image: alpine:latest
    command: tail -f /dev/null
    container_name: my_game_server

  discord-bot:
    build: .
    container_name: discord_bot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - bot_data:/app/data
      # Mount src directory for live code updates (requires restart)
      - ./src:/app/src
    environment:
      - BOT_TOKEN
      - ALLOWED_CONTAINERS=my_game_server
      - DEFAULT_ALLOWED_ROLES=ServerAdmin
      - STATUS_PORT=8000
      - DOCKER_MAX_WORKERS=2
      - SHUTDOWN_DELAY=10
      - LOG_LEVEL=DEBUG
      - DISCORD_GUILD_ID
      - ALLOW_ANY_GUILD
      - ANNOUNCE_CHANNEL_ID
      - ANNOUNCE_ROLE_ID
      - ALLOWED_CHANNEL_IDS
      - STATUS_TOKEN
      - COMMAND_COOLDOWN
      - CRASH_CHECK_INTERVAL
      - CRASH_ALERT_CHANNEL_ID
      - HISTORY_FILE
      - PERMISSIONS_FILE
      - LOG_FILE
      - HEALTHCHECK_POLL_INTERVAL
      - HEALTHCHECK_MAX_WAIT
      # Without this passthrough, a dev who sets a real template (screen/rcon) in
      # .env silently gets config.py's `echo "Message: {message}"` default, so
      # !announce never exercises the /bin/sh -c template path it takes in prod --
      # i.e. the one path local dev exists to test.
      - CONTAINER_MESSAGE_CMD
    # No compose-level healthcheck override -- the image's own HEALTHCHECK (Dockerfile)
    # already expands ${STATUS_PORT:-8000} correctly and hits /healthz, so it stays
    # correct even if STATUS_PORT is customized here.
    ports:
      # Bound wide open for local dev convenience. The /status API includes recent
      # log lines and the permission map -- don't do this on a host reachable from
      # the internet. See docker-compose.yml for the loopback-only production default.
      - "8000:8000"

volumes:
  bot_data: